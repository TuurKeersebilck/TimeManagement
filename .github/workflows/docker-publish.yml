name: Build and publish Docker images

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker-publish.yml'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Read app version
        run: echo "APP_VERSION=$(jq -r .version frontend/package.json)" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/timemanagement-backend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/timemanagement-backend:${{ env.APP_VERSION }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/timemanagement-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy changelog into frontend public
        run: cp CHANGELOG.md frontend/public/CHANGELOG.md

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/timemanagement-frontend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/timemanagement-frontend:${{ env.APP_VERSION }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/timemanagement-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
