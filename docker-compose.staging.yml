name: timemanagement-staging

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - staging_db_data:/var/lib/postgresql
    networks:
      - backend-db
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  backend:
    image: timemanagement-backend:staging
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - data_protection_keys:/home/app/.aspnet/DataProtection-Keys
    env_file: /home/tuurk/staging/timemanagement/.env
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ASPNETCORE_URLS: http://+:8080
    networks:
      - proxy
      - backend-db
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    image: timemanagement-frontend:staging
    restart: unless-stopped
    labels:
      caddy: timemanagement-staging.home.tuurk.org
      caddy.tls: internal
      caddy.reverse_proxy: "{{upstreams 80}}"
    networks:
      - proxy
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  staging_db_data:
  data_protection_keys:

networks:
  proxy:
    external: true
  backend-db:
